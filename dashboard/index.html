<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Skill Benchmark Dashboard</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --border: #2a2d3a;
    --text: #e4e4e7;
    --muted: #8b8d98;
    --green: #22c55e;
    --red: #ef4444;
    --blue: #3b82f6;
    --amber: #f59e0b;
    --purple: #a855f7;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 24px;
    min-height: 100vh;
  }
  h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 4px; }
  .subtitle { color: var(--muted); font-size: 0.875rem; margin-bottom: 24px; }

  /* Top summary cards */
  .summary {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
  }
  .summary-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }
  .summary-card .label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .summary-card .value {
    font-size: 2rem;
    font-weight: 700;
    line-height: 1;
  }
  .summary-card .detail {
    font-size: 0.8rem;
    color: var(--muted);
    margin-top: 6px;
  }
  .positive { color: var(--green); }
  .negative { color: var(--red); }
  .neutral { color: var(--blue); }

  /* Chart area */
  .chart-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 24px;
  }
  .chart-section h2 {
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: 16px;
  }
  .bar-chart { display: flex; flex-direction: column; gap: 12px; }
  .bar-row {
    display: grid;
    grid-template-columns: 160px 1fr 60px;
    align-items: center;
    gap: 12px;
  }
  .bar-label {
    font-size: 0.8rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .bar-track {
    height: 28px;
    background: #1e2130;
    border-radius: 6px;
    position: relative;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 6px;
    display: flex;
    align-items: center;
    padding-left: 8px;
    font-size: 0.7rem;
    font-weight: 600;
    transition: width 0.6s ease;
    min-width: 2px;
  }
  .bar-baseline { background: rgba(239,68,68,0.5); position: absolute; top: 0; }
  .bar-skill { background: rgba(34,197,94,0.6); position: absolute; top: 0; }
  .bar-value { font-size: 0.8rem; color: var(--muted); text-align: right; }

  /* Test table */
  .table-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    overflow-x: auto;
  }
  .table-section h2 {
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: 16px;
  }
  table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  th {
    text-align: left;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    color: var(--muted);
    font-weight: 500;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  td {
    padding: 10px 12px;
    border-bottom: 1px solid #1e2130;
  }
  tr:last-child td { border-bottom: none; }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 0.7rem;
    font-weight: 600;
  }
  .badge-static { background: #1e3a5f; color: #60a5fa; }
  .badge-js { background: #3b1f0b; color: #fb923c; }
  .badge-interactive { background: #2d1b4e; color: #c084fc; }
  .badge-discovery { background: #1a2e1a; color: #86efac; }
  .badge-failure { background: #3b1111; color: #fca5a5; }
  .score-pill {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 100px;
    font-weight: 700;
    font-size: 0.8rem;
  }

  /* File loader */
  .loader {
    text-align: center;
    padding: 48px;
  }
  .loader label {
    display: inline-block;
    padding: 12px 24px;
    background: var(--blue);
    color: white;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    font-size: 0.9rem;
  }
  .loader label:hover { opacity: 0.9; }
  .loader input { display: none; }
  .loader p { color: var(--muted); margin-top: 12px; font-size: 0.85rem; }

  /* Legend */
  .legend {
    display: flex;
    gap: 24px;
    margin-bottom: 12px;
    font-size: 0.8rem;
  }
  .legend-dot {
    display: inline-block;
    width: 10px; height: 10px;
    border-radius: 3px;
    margin-right: 6px;
    vertical-align: middle;
  }
</style>
</head>
<body>

<h1>Web Skill Benchmark Dashboard</h1>
<p class="subtitle">Compare baseline (no skill) vs /web skill — efficiency scores, token usage, and quality</p>

<div id="app">
  <div class="loader">
    <label>
      Load Results JSON
      <input type="file" id="fileInput" accept=".json">
    </label>
    <p>Drop a benchmark results JSON file from <code>benchmarks/results/</code></p>
    <p style="margin-top:24px; font-size:0.8rem;">Or <a href="#" id="loadSample" style="color:var(--blue);">load sample data</a> to see the dashboard in action</p>
  </div>
</div>

<script>
const SAMPLE_DATA = {
  "meta": { "date": "2026-03-14", "runner": "sample", "notes": "Sample data for demo" },
  "runs": [
    { "test_id":1, "test_name":"Python 3.12 docs", "category":"static", "baseline":{"tool_used":"WebFetch","completeness":3,"accuracy":3,"tokens_used":4200,"turns":1}, "skill":{"tool_used":"WebFetch","completeness":3,"accuracy":3,"tokens_used":4400,"turns":1} },
    { "test_id":2, "test_name":"Rust blog post", "category":"static", "baseline":{"tool_used":"WebFetch","completeness":2,"accuracy":2,"tokens_used":5100,"turns":2}, "skill":{"tool_used":"WebFetch","completeness":3,"accuracy":3,"tokens_used":4800,"turns":1} },
    { "test_id":3, "test_name":"Vercel pricing", "category":"js-heavy", "baseline":{"tool_used":"WebFetch","completeness":0,"accuracy":0,"tokens_used":8500,"turns":3}, "skill":{"tool_used":"Firecrawl","completeness":3,"accuracy":3,"tokens_used":3200,"turns":1} },
    { "test_id":4, "test_name":"React useState docs", "category":"js-heavy", "baseline":{"tool_used":"WebFetch","completeness":1,"accuracy":1,"tokens_used":12000,"turns":3}, "skill":{"tool_used":"Firecrawl","completeness":3,"accuracy":3,"tokens_used":4100,"turns":1} },
    { "test_id":7, "test_name":"HTTP libs comparison", "category":"discovery", "baseline":{"tool_used":"WebSearch","completeness":2,"accuracy":2,"tokens_used":9800,"turns":4}, "skill":{"tool_used":"Firecrawl search","completeness":3,"accuracy":3,"tokens_used":5200,"turns":2} },
    { "test_id":10, "test_name":"Figma features", "category":"failure-case", "baseline":{"tool_used":"WebFetch","completeness":0,"accuracy":0,"tokens_used":6200,"turns":2}, "skill":{"tool_used":"Firecrawl","completeness":3,"accuracy":2,"tokens_used":3800,"turns":1} }
  ]
};

function calcScore(r) {
  if (!r || r.tokens_used === 0) return 0;
  return (r.completeness * r.accuracy) / (r.tokens_used / 1000);
}

function categoryBadge(cat) {
  const map = {
    'static': 'badge-static',
    'js-heavy': 'badge-js',
    'interactive': 'badge-interactive',
    'discovery': 'badge-discovery',
    'failure-case': 'badge-failure'
  };
  return `<span class="badge ${map[cat] || 'badge-static'}">${cat}</span>`;
}

function scorePillColor(score) {
  if (score >= 3) return 'var(--green)';
  if (score >= 1) return 'var(--amber)';
  return 'var(--red)';
}

function pctChange(baseline, skill) {
  if (baseline === 0) return skill > 0 ? '+100' : '0';
  return (((skill - baseline) / baseline) * 100).toFixed(0);
}

function render(data) {
  const runs = data.runs;

  // Aggregate stats
  let totalBaselineTokens = 0, totalSkillTokens = 0;
  let totalBaselineScore = 0, totalSkillScore = 0;
  let totalBaselineTurns = 0, totalSkillTurns = 0;
  let skillWins = 0;

  runs.forEach(r => {
    const bs = calcScore(r.baseline);
    const ss = calcScore(r.skill);
    totalBaselineTokens += r.baseline.tokens_used;
    totalSkillTokens += r.skill.tokens_used;
    totalBaselineScore += bs;
    totalSkillScore += ss;
    totalBaselineTurns += r.baseline.turns;
    totalSkillTurns += r.skill.turns;
    if (ss > bs) skillWins++;
  });

  const avgBaselineScore = totalBaselineScore / runs.length;
  const avgSkillScore = totalSkillScore / runs.length;
  const tokenSavingsPct = ((1 - totalSkillTokens / totalBaselineTokens) * 100).toFixed(0);
  const scorePct = pctChange(avgBaselineScore, avgSkillScore);
  const turnSavings = totalBaselineTurns - totalSkillTurns;

  const app = document.getElementById('app');
  app.innerHTML = `
    <!-- Summary Cards -->
    <div class="summary">
      <div class="summary-card">
        <div class="label">Avg Efficiency Score</div>
        <div class="value neutral">${avgSkillScore.toFixed(2)}</div>
        <div class="detail">Baseline: ${avgBaselineScore.toFixed(2)} (${scorePct > 0 ? '+' : ''}${scorePct}%)</div>
      </div>
      <div class="summary-card">
        <div class="label">Token Savings</div>
        <div class="value ${tokenSavingsPct > 0 ? 'positive' : 'negative'}">${tokenSavingsPct}%</div>
        <div class="detail">${totalSkillTokens.toLocaleString()} vs ${totalBaselineTokens.toLocaleString()} baseline</div>
      </div>
      <div class="summary-card">
        <div class="label">Turns Saved</div>
        <div class="value positive">${turnSavings}</div>
        <div class="detail">${totalSkillTurns} vs ${totalBaselineTurns} baseline turns</div>
      </div>
      <div class="summary-card">
        <div class="label">Skill Wins</div>
        <div class="value positive">${skillWins}/${runs.length}</div>
        <div class="detail">Tests where /web scored higher</div>
      </div>
    </div>

    <!-- Token Usage Chart -->
    <div class="chart-section">
      <h2>Token Usage: Baseline vs /web Skill</h2>
      <div class="legend">
        <span><span class="legend-dot" style="background:rgba(239,68,68,0.5)"></span>Baseline</span>
        <span><span class="legend-dot" style="background:rgba(34,197,94,0.6)"></span>/web Skill</span>
      </div>
      <div class="bar-chart" id="tokenChart"></div>
    </div>

    <!-- Efficiency Score Chart -->
    <div class="chart-section">
      <h2>Efficiency Score by Test</h2>
      <div class="legend">
        <span><span class="legend-dot" style="background:rgba(239,68,68,0.5)"></span>Baseline</span>
        <span><span class="legend-dot" style="background:rgba(34,197,94,0.6)"></span>/web Skill</span>
      </div>
      <div class="bar-chart" id="scoreChart"></div>
    </div>

    <!-- Detail Table -->
    <div class="table-section">
      <h2>Detailed Results</h2>
      <table>
        <thead>
          <tr>
            <th>Test</th>
            <th>Category</th>
            <th>Baseline Tool</th>
            <th>Skill Tool</th>
            <th>Baseline Score</th>
            <th>Skill Score</th>
            <th>Token Change</th>
          </tr>
        </thead>
        <tbody id="detailTable"></tbody>
      </table>
    </div>

    <p style="text-align:center; color:var(--muted); margin-top:24px; font-size:0.75rem;">
      Run: ${data.meta.date} by ${data.meta.runner} &mdash; ${data.meta.notes}
    </p>
  `;

  // Render token bar chart
  const maxTokens = Math.max(...runs.map(r => Math.max(r.baseline.tokens_used, r.skill.tokens_used)));
  const tokenChart = document.getElementById('tokenChart');
  runs.forEach(r => {
    const bPct = (r.baseline.tokens_used / maxTokens * 100).toFixed(1);
    const sPct = (r.skill.tokens_used / maxTokens * 100).toFixed(1);
    tokenChart.innerHTML += `
      <div class="bar-row">
        <div class="bar-label">${r.test_name}</div>
        <div class="bar-track">
          <div class="bar-fill bar-baseline" style="width:${bPct}%"></div>
          <div class="bar-fill bar-skill" style="width:${sPct}%"></div>
        </div>
        <div class="bar-value">${((1 - r.skill.tokens_used/r.baseline.tokens_used)*100).toFixed(0)}%</div>
      </div>
    `;
  });

  // Render score chart
  const maxScore = Math.max(...runs.map(r => Math.max(calcScore(r.baseline), calcScore(r.skill))), 1);
  const scoreChart = document.getElementById('scoreChart');
  runs.forEach(r => {
    const bs = calcScore(r.baseline);
    const ss = calcScore(r.skill);
    const bPct = (bs / maxScore * 100).toFixed(1);
    const sPct = (ss / maxScore * 100).toFixed(1);
    scoreChart.innerHTML += `
      <div class="bar-row">
        <div class="bar-label">${r.test_name}</div>
        <div class="bar-track">
          <div class="bar-fill bar-baseline" style="width:${bPct}%"></div>
          <div class="bar-fill bar-skill" style="width:${sPct}%"></div>
        </div>
        <div class="bar-value">${ss.toFixed(1)}</div>
      </div>
    `;
  });

  // Render detail table
  const tbody = document.getElementById('detailTable');
  runs.forEach(r => {
    const bs = calcScore(r.baseline);
    const ss = calcScore(r.skill);
    const tokenChange = ((1 - r.skill.tokens_used / r.baseline.tokens_used) * 100).toFixed(0);
    const tokenColor = tokenChange > 0 ? 'positive' : (tokenChange < 0 ? 'negative' : 'muted');
    tbody.innerHTML += `
      <tr>
        <td>${r.test_name}</td>
        <td>${categoryBadge(r.category)}</td>
        <td>${r.baseline.tool_used}</td>
        <td>${r.skill.tool_used}</td>
        <td><span class="score-pill" style="background:${scorePillColor(bs)}20; color:${scorePillColor(bs)}">${bs.toFixed(2)}</span></td>
        <td><span class="score-pill" style="background:${scorePillColor(ss)}20; color:${scorePillColor(ss)}">${ss.toFixed(2)}</span></td>
        <td class="${tokenColor}">${tokenChange > 0 ? '-' : '+'}${Math.abs(tokenChange)}%</td>
      </tr>
    `;
  });
}

// File input handler
document.getElementById('fileInput').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const data = JSON.parse(ev.target.result);
      render(data);
    } catch (err) {
      alert('Invalid JSON file: ' + err.message);
    }
  };
  reader.readAsText(file);
});

// Sample data loader
document.getElementById('loadSample').addEventListener('click', (e) => {
  e.preventDefault();
  render(SAMPLE_DATA);
});

// Drag and drop
document.body.addEventListener('dragover', e => e.preventDefault());
document.body.addEventListener('drop', (e) => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try { render(JSON.parse(ev.target.result)); }
    catch (err) { alert('Invalid JSON: ' + err.message); }
  };
  reader.readAsText(file);
});
</script>
</body>
</html>
